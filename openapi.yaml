version: 3

tasks:

  swagger2openapi:
    desc: Converts an old Swagger to modern OpenAPI.
    preconditions:
    - sh: command -v npx >/dev/null 2>&1
      msg: "Missing npx, see https://docs.npmjs.com/cli/v8/commands/npx"
    cmds:
    - |
      npx \
      --yes \
      --package=swagger2openapi \
      swagger2openapi \
      {{.API}} \
      -o {{.OUTPUT}}

  bundle:
    desc: Given an input OpenAPI YAML document, bundles the API description.
    preconditions:
    - sh: command -v npx >/dev/null 2>&1
      msg: "Missing npx, see https://docs.npmjs.com/cli/v8/commands/npx"
    cmds:
    - |
      npx \
      --yes \
      --package=@redocly/cli \
      redocly \
      bundle \
      {{.API}} \
      --output={{.OUTPUT}} \
      --remove-unused-components \
      --lint-config

  generate_docs:
    desc: Given an input OpenAPI YAML document, creates Redocly human-readable documentation.
    preconditions:
    - sh: command -v npx >/dev/null 2>&1
      msg: "Missing npx, see https://docs.npmjs.com/cli/v8/commands/npx"
    cmds:
    - |
      npx \
      --yes \
      --package=@redocly/cli \
      redocly \
      build-docs \
      {{.API}} \
      --output={{.OUTPUT}}

  toml_set:
    internal: true
    cmds:
      - |
        TOML_VALUE='{{.VALUE}}'

        uv run \
          --no-cache \
          --no-project \
          --with toml-cli \
          toml set \
          --toml-path {{.TOML_PATH}} \
          {{.PROPERTY}} \
          "$TOML_VALUE"

  generate_skeleton:
    desc: Given an input OpenAPI YAML document, creates FastAPI server skeleton with Pydantic v2 models.
    preconditions:
    - sh: command -v uv >/dev/null 2>&1
      msg: "Missing uv, see https://docs.astral.sh/uv/"
    vars:
      OUTPUT: '{{.OUTPUT | default "."}}'
      PROJECT_TITLE:
        sh: yq '.info.title' {{.API}}
      OUTPUT_DIR:
        sh: yq '.info.title | downcase | sub("[[:space:]]+", "-") + "-microservices"' {{.API}}
    cmds:
    - mkdir -p {{.OUTPUT}}/{{.OUTPUT_DIR}}
    - cd {{.OUTPUT}}/{{.OUTPUT_DIR}} && uv run --no-cache --no-project --with hatch hatch new --init {{.OUTPUT_DIR}}
    - task: toml_set
      vars:
        TOML_PATH: '{{.OUTPUT}}/{{.OUTPUT_DIR}}/pyproject.toml'
        PROPERTY: 'project.description'
        VALUE: 'A FastAPI Microservices module to expose {{.PROJECT_TITLE}}'
    - task: toml_set
      vars:
        TOML_PATH: '{{.OUTPUT}}/{{.OUTPUT_DIR}}/pyproject.toml'
        PROPERTY: 'project.dependencies'
        VALUE: '["fastapi", "uvicorn", "pydantic"]'
    - |
      uv run \
      --no-cache \
      --no-project \
      --with 'datamodel-code-generator[ruff]' \
      --with fastapi-code-generator \
      fastapi-codegen \
      --input {{.API}} \
      --output {{.OUTPUT}}/{{.OUTPUT_DIR}}/src/$(echo "{{.OUTPUT_DIR}}" | sed 's/-/_/g') \
      --output-model-type pydantic_v2.BaseModel

  generate_client:
    desc: Given an input OpenAPI YAML document, creates an httpx based client implementation with Pydantic v2 models.
    preconditions:
    - sh: command -v uv >/dev/null 2>&1
      msg: "Missing uv, see https://docs.astral.sh/uv/"
    vars:
      OUTPUT: '{{.OUTPUT | default "."}}'
      OUTPUT_DIR:
        sh: yq '.info.title | downcase | sub("[[:space:]]+", "-") + "-client"' {{.API}}
    cmds:
    - mkdir -p {{.OUTPUT}}/{{.OUTPUT_DIR}}
    - |
      uv run \
      --no-cache \
      --no-project \
      --with openapi-python-client \
      --with 'datamodel-code-generator[ruff]' \
      openapi-python-client generate \
      --meta pdm \
      --path {{.API}} \
      --output-path {{.OUTPUT}}/{{.OUTPUT_DIR}} \
      --overwrite
