version: 3

tasks:

  create_models:
    desc: Given a JSON Schema, generates the related Pydantic v2 models (with field aliases).
    preconditions:
    - sh: command -v uv >/dev/null 2>&1
      msg: "Missing uv, see https://docs.astral.sh/uv/"
    cmds:
    - |
      uv run \
      --no-cache \
      --with "datamodel-code-generator[http{{if eq .DEBUG "true"}},debug{{end}}]" \
      datamodel-codegen \
                        --additional-imports {{if .ADDITIONAL_IMPORTS}}{{.ADDITIONAL_IMPORTS}}{{else}}pydantic.BaseModel{{end}} \
                        --allow-extra-fields \
                        --allow-population-by-field-name \
                        --allow-remote-refs \
                        --base-class {{if .BASE_CLASS}}{{.BASE_CLASS}}{{else}}pydantic.BaseModel{{end}} \
                        --capitalise-enum-members \
                        --collapse-root-models \
                        {{if .CUSTOM_TEMPLATE_DIR}}--custom-template-dir {{.CUSTOM_TEMPLATE_DIR}} \{{else}}\{{end}}
                        {{if eq .DEBUG "true"}}--debug \{{else}}\{{end}}
                        --field-constraints \
                        --formatters ruff-check ruff-format \
                        {{if regexMatch "^[[:alpha:]][[:alnum:]+.-]*://" .SCHEMA}}--url {{.SCHEMA}}{{else}}--input {{.SCHEMA}}{{end}} \
                        --input-file-type jsonschema \
                        --output {{.OUTPUT}} \
                        --output-model-type pydantic_v2.BaseModel \
                        --reuse-model \
                        --snake-case-field \
                        --use-default \
                        --use-double-quotes \
                        --use-field-description \
                        --use-one-literal-as-default \
                        --use-schema-description \
                        --use-schema-description \
                        --use-standard-collections

  generate_schema_doc:
    desc: Generates the JSON Schema related Markdown documentation pages.
    preconditions:
    - sh: command -v uv >/dev/null 2>&1
      msg: "Missing uv, see https://docs.astral.sh/uv/"
    cmds:
    - |
      uv run \
      --no-cache \
      --with json-schema-for-humans \
      generate-schema-doc --config template_name=md {{.SOURCE}} {{.TARGET}}

  check_instance:
    desc: Executes a strict JSON Schema check of an instance file against an input schema.
    preconditions:
    - sh: command -v uv >/dev/null 2>&1
      msg: "Missing uv, see https://docs.astral.sh/uv/"
    ignore_error: true
    cmds:
    - |
      uv run \
      --no-cache \
      --with check-jsonschema \
      check-jsonschema --schemafile {{.SCHEMA}} {{.INSTANCE}}

  bundle:
    desc: Bundles an input JSON Schema document.
    preconditions:
    - sh: command -v npx >/dev/null 2>&1
      msg: "Missing npx, see https://docs.npmjs.com/cli/v8/commands/npx"
    cmds:
    - |
      npx \
      --yes \
      --package=@sourcemeta/jsonschema \
      jsonschema \
      bundle \
      {{.SCHEMA}} \
      --http > {{.OUTPUT}}
